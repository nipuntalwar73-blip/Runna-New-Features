<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Runner Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060a14;font-family:'Courier New',monospace;color:#fff;}
@keyframes blink{from{opacity:0.4}to{opacity:1}}
@keyframes lapPop{0%{transform:scale(1)}40%{transform:scale(1.4)}100%{transform:scale(1)}}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#0a0e1a;}
::-webkit-scrollbar-thumb{background:#00e5ff44;border-radius:3px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ─── HARDCODED ROUTE: A→B→C→D→A × 4 laps ────────────────────────────
const BASE_CIRCUIT = [
  {from:"A", to:"B", minutes:3},
  {from:"B", to:"C", minutes:2.5},
  {from:"C", to:"D", minutes:2},
  {from:"D", to:"A", minutes:1},
];
const LAPS = 4;
const SEGMENTS = [];
for(let i=0;i<LAPS;i++) BASE_CIRCUIT.forEach(s=>SEGMENTS.push({...s}));

// A=bottom-left, B=bottom-right, C=top-right, D=top-left — perfect square
const CENTER = [12.9780, 77.5990];
const R_LAT = 0.010, R_LNG = 0.013;
const LABEL_COORDS = {
  A: [CENTER[0] + R_LAT*Math.sin(Math.PI*1.25), CENTER[1] + R_LNG*Math.cos(Math.PI*1.25)], // bottom-left
  B: [CENTER[0] + R_LAT*Math.sin(Math.PI*1.75), CENTER[1] + R_LNG*Math.cos(Math.PI*1.75)], // bottom-right
  C: [CENTER[0] + R_LAT*Math.sin(Math.PI*0.25), CENTER[1] + R_LNG*Math.cos(Math.PI*0.25)], // top-right
  D: [CENTER[0] + R_LAT*Math.sin(Math.PI*0.75), CENTER[1] + R_LNG*Math.cos(Math.PI*0.75)], // top-left
};
// Lap boundaries: end of every 4th segment (index 3, 7, 11, 15)
const LAP_BOUNDARIES = [3, 7, 11, 15];
const LAP_COLORS = ["#00e5ff","#00ffb3","#f0c040","#ff6b35"];
const ROUTE_LOG = SEGMENTS.map(s=>`${s.from} → ${s.to}: ${s.minutes} min`);

// ─── Helpers ─────────────────────────────────────────────────────────
function lerp(a,b,t){return a+(b-a)*t;}
function lerpCoord(c1,c2,t){return[lerp(c1[0],c2[0],t),lerp(c1[1],c2[1],t)];}
function latLngToPixel(lat,lng,bounds,W,H){
  return[((lng-bounds.west)/(bounds.east-bounds.west))*W,
         ((bounds.north-lat)/(bounds.north-bounds.south))*H];
}
function coordDist(c1,c2){
  const R=6371,dLat=(c2[0]-c1[0])*Math.PI/180,dLng=(c2[1]-c1[1])*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(c1[0]*Math.PI/180)*Math.cos(c2[0]*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function smoothNoise(t,seed=0){
  const i=Math.floor(t),f=t-i,fade=f*f*f*(f*(f*6-15)+10);
  const r1=Math.abs((Math.sin((i+seed)*127.1+311.7)*43758.5453)%1);
  const r2=Math.abs((Math.sin((i+1+seed)*127.1+311.7)*43758.5453)%1);
  return lerp(r1,r2,fade);
}
function realisticSpeed(baseKmh,t,segIdx){
  const n=smoothNoise(t*0.28,segIdx*17)*0.5+smoothNoise(t*1.1,segIdx*31)*0.35+smoothNoise(t*3.9,segIdx*53)*0.15;
  return Math.max(0.5,baseKmh*(1+(n-0.5)*2*0.38)*(1-(t%60)/60*0.05));
}

// ─── Speed Gauge ─────────────────────────────────────────────────────
function SpeedGauge({speedKmh,maxSpeed=20}){
  const ref=useRef(null);
  useEffect(()=>{
    const canvas=ref.current; if(!canvas) return;
    const ctx=canvas.getContext("2d");
    const W=canvas.width,H=canvas.height,cx=W/2,cy=H*0.58,R=W*0.37;
    ctx.clearRect(0,0,W,H); ctx.fillStyle="#060a14"; ctx.fillRect(0,0,W,H);
    const sA=Math.PI*0.78,eA=Math.PI*2.22;
    ctx.beginPath(); ctx.arc(cx,cy,R,sA,eA);
    ctx.strokeStyle="rgba(255,255,255,0.07)"; ctx.lineWidth=13; ctx.lineCap="round"; ctx.stroke();
    const frac=Math.min(speedKmh/maxSpeed,1);
    if(frac>0){
      const fe=sA+(eA-sA)*frac;
      const g=ctx.createLinearGradient(cx-R,cy,cx+R,cy);
      g.addColorStop(0,"#00e5ff"); g.addColorStop(0.55,"#00ffb3"); g.addColorStop(1,"#ff6b35");
      ctx.beginPath(); ctx.arc(cx,cy,R,sA,fe);
      ctx.strokeStyle=g; ctx.lineWidth=13; ctx.lineCap="round"; ctx.stroke();
      const tx=cx+Math.cos(fe)*R,ty=cy+Math.sin(fe)*R;
      const tg=ctx.createRadialGradient(tx,ty,0,tx,ty,16);
      tg.addColorStop(0,"rgba(0,255,180,0.9)"); tg.addColorStop(1,"transparent");
      ctx.fillStyle=tg; ctx.beginPath(); ctx.arc(tx,ty,16,0,Math.PI*2); ctx.fill();
    }
    [0,5,10,15,20].forEach(v=>{
      const a=sA+(eA-sA)*(v/maxSpeed),cos=Math.cos(a),sin=Math.sin(a);
      ctx.beginPath(); ctx.moveTo(cx+cos*(R-15),cy+sin*(R-15)); ctx.lineTo(cx+cos*R,cy+sin*R);
      ctx.strokeStyle="rgba(255,255,255,0.28)"; ctx.lineWidth=1.5; ctx.stroke();
      ctx.fillStyle="rgba(255,255,255,0.45)"; ctx.font="8px 'Courier New'";
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(v,cx+cos*(R-26),cy+sin*(R-26));
    });
    const nA=sA+(eA-sA)*frac;
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(nA);
    const ng=ctx.createLinearGradient(-8,0,R*0.75,0);
    ng.addColorStop(0,"rgba(255,255,255,0.1)"); ng.addColorStop(0.6,"rgba(255,255,255,0.85)"); ng.addColorStop(1,"#fff");
    ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(R*0.75,-2.5); ctx.lineTo(R*0.75,2.5); ctx.closePath();
    ctx.fillStyle=ng; ctx.fill(); ctx.restore();
    const hb=ctx.createRadialGradient(cx,cy,0,cx,cy,10);
    hb.addColorStop(0,"#fff"); hb.addColorStop(0.5,"#00e5ff"); hb.addColorStop(1,"#003344");
    ctx.beginPath(); ctx.arc(cx,cy,10,0,Math.PI*2); ctx.fillStyle=hb; ctx.fill();
    ctx.fillStyle="#fff"; ctx.font="bold 25px 'Courier New'";
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(speedKmh.toFixed(1),cx,cy+R*0.44);
    ctx.fillStyle="rgba(0,229,255,0.75)"; ctx.font="bold 9px 'Courier New'";
    ctx.fillText("km/h",cx,cy+R*0.44+19);
    const lbl=speedKmh<0.5?"STOPPED":speedKmh<6?"WALKING":speedKmh<12?"JOGGING":"RUNNING";
    const lc=speedKmh<0.5?"#444":speedKmh<6?"#00e5ff":speedKmh<12?"#00ffb3":"#ff6b35";
    ctx.fillStyle=lc; ctx.font="bold 9px 'Courier New'"; ctx.fillText(lbl,cx,cy-R*0.52);
  },[speedKmh]);
  return React.createElement('canvas',{ref,width:195,height:165,style:{borderRadius:10,display:"block"}});
}

// ─── Sparkline ───────────────────────────────────────────────────────
function SpeedSparkline({history}){
  const ref=useRef(null);
  useEffect(()=>{
    const canvas=ref.current; if(!canvas||history.length<2) return;
    const ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);
    const pts=history.slice(-250),maxV=Math.max(...pts,1),step=W/(pts.length-1);
    const grd=ctx.createLinearGradient(0,0,0,H);
    grd.addColorStop(0,"rgba(0,255,180,0.22)"); grd.addColorStop(1,"rgba(0,255,180,0)");
    ctx.beginPath();
    pts.forEach((v,i)=>{const x=i*step,y=H-(v/maxV)*H*0.85; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.lineTo((pts.length-1)*step,H); ctx.lineTo(0,H); ctx.closePath();
    ctx.fillStyle=grd; ctx.fill();
    ctx.beginPath();
    pts.forEach((v,i)=>{const x=i*step,y=H-(v/maxV)*H*0.85; i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.strokeStyle="#00ffb3"; ctx.lineWidth=1.5; ctx.lineJoin="round"; ctx.stroke();
  },[history,history.length]);
  return React.createElement('canvas',{ref,width:340,height:44,style:{width:"100%",height:44,display:"block",borderRadius:6}});
}

// ─── Lap Counter ─────────────────────────────────────────────────────
function LapCounter({laps,currentSeg,isRunning,lapFlash}){
  const e=React.createElement;
  return e('div',{style:{display:"flex",flexDirection:"column"}},
    e('div',{style:{display:"flex",alignItems:"flex-end",gap:10,marginBottom:14}},
      e('div',{style:{
        fontSize:76,fontWeight:"bold",lineHeight:1,
        color:laps>0?"#00ffb3":"rgba(255,255,255,0.13)",
        textShadow:laps>0?"0 0 36px rgba(0,255,180,0.7)":"none",
        fontFamily:"'Courier New',monospace",
        animation:lapFlash?"lapPop 0.5s ease":"none",
        transition:"color 0.3s, text-shadow 0.3s"
      }},laps),
      e('div',{style:{paddingBottom:12}},
        e('div',{style:{fontSize:10,color:"#00e5ff",letterSpacing:4}},`LAP${laps!==1?"S":""}`),
        e('div',{style:{fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:2}},`of ${LAPS}`)
      )
    ),
    // 4 lap dots
    e('div',{style:{marginBottom:14}},
      e('div',{style:{fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:3,marginBottom:8}},"LAP PROGRESS"),
      e('div',{style:{display:"flex",gap:7}},
        LAP_COLORS.map((c,i)=>{
          const done=i<laps;
          return e('div',{key:i,style:{
            width:30,height:30,borderRadius:"50%",
            border:`2px solid ${done?c:"rgba(255,255,255,0.13)"}`,
            background:done?`${c}22`:"transparent",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:11,fontWeight:"bold",
            color:done?c:"rgba(255,255,255,0.18)",
            boxShadow:done?`0 0 12px ${c}66`:"none",
            transition:"all 0.4s"
          }},i+1);
        })
      )
    ),
    // Lap splits (completed laps only)
    laps>0&&e('div',{style:{marginBottom:14}},
      e('div',{style:{fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:3,marginBottom:8}},"LAP SPLITS"),
      e('div',{style:{display:"flex",flexDirection:"column",gap:5}},
        Array.from({length:laps}).map((_,i)=>{
          const lapMin = BASE_CIRCUIT.reduce((a,s)=>a+s.minutes,0); // 8.5 min each
          const c=LAP_COLORS[i];
          return e('div',{key:i,style:{display:"flex",alignItems:"center",gap:8,fontSize:11}},
            e('div',{style:{width:20,height:20,borderRadius:"50%",background:`${c}22`,border:`1.5px solid ${c}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:"bold",color:c,flexShrink:0}},i+1),
            e('div',{style:{flex:1,height:3,background:`${c}22`,borderRadius:2}},
              e('div',{style:{height:"100%",background:c,borderRadius:2,width:"100%"}})
            ),
            e('div',{style:{color:"rgba(255,255,255,0.55)",fontSize:11,minWidth:42,textAlign:"right"}},`${lapMin}m`)
          );
        })
      )
    ),
    // Current lap in-progress bar
    isRunning&&laps<LAPS&&(()=>{
      const lapStart = laps*4; // segment index where current lap starts
      const lapEnd   = laps*4+3;
      const segsIntoLap = Math.max(0, currentSeg - lapStart);
      const lapPct = (segsIntoLap/4)*100;
      const c = LAP_COLORS[laps];
      return e('div',null,
        e('div',{style:{fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:3,marginBottom:6}},`LAP ${laps+1} IN PROGRESS`),
        e('div',{style:{height:6,background:"rgba(255,255,255,0.07)",borderRadius:3}},
          e('div',{style:{height:"100%",borderRadius:3,width:`${Math.min(lapPct,100)}%`,background:`linear-gradient(90deg,${c},${c}88)`,transition:"width 0.3s"}})
        ),
        e('div',{style:{fontSize:9,color:"rgba(255,255,255,0.25)",marginTop:3,textAlign:"right"}},`${Math.round(Math.min(lapPct,100))}%`)
      );
    })()
  );
}

// ─── Map Canvas ───────────────────────────────────────────────────────
function MapCanvas({isRunning,progress,currentSeg,currentLap,completedLaps}){
  const ref=useRef(null),mapRef=useRef(null);
  const [mapLoaded,setMapLoaded]=useState(false);
  const bounds={north:12.995,south:12.960,west:77.580,east:77.620};

  useEffect(()=>{
    const img=new Image(); img.crossOrigin="anonymous";
    img.src="https://tile.openstreetmap.org/15/23086/14458.png";
    img.onload=()=>{mapRef.current=img; setMapLoaded(true);};
    img.onerror=()=>setMapLoaded(true);
  },[]);

  const px=useCallback((coord)=>{
    const c=ref.current; if(!c) return [0,0];
    return latLngToPixel(coord[0],coord[1],bounds,c.width,c.height);
  },[]);

  useEffect(()=>{
    const canvas=ref.current; if(!canvas) return;
    const ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);

    if(mapRef.current&&mapLoaded){
      ctx.drawImage(mapRef.current,0,0,W,H);
      ctx.fillStyle="rgba(6,10,20,0.3)"; ctx.fillRect(0,0,W,H);
    } else {
      ctx.fillStyle="#111825"; ctx.fillRect(0,0,W,H);
    }

    // Future segments — dashed white
    SEGMENTS.forEach((seg,i)=>{
      if(i<=currentSeg) return;
      const fc=LABEL_COORDS[seg.from],tc=LABEL_COORDS[seg.to];
      const [fx,fy]=px(fc),[tx,ty]=px(tc);
      ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(tx,ty);
      ctx.strokeStyle="rgba(255,255,255,0.1)"; ctx.lineWidth=2;
      ctx.setLineDash([6,6]); ctx.stroke(); ctx.setLineDash([]);
    });

    // Completed segments — coloured by lap
    SEGMENTS.forEach((seg,i)=>{
      if(i>=currentSeg) return;
      const fc=LABEL_COORDS[seg.from],tc=LABEL_COORDS[seg.to];
      const [fx,fy]=px(fc),[tx,ty]=px(tc);
      const lapIdx=Math.floor(i/4);
      const col=LAP_COLORS[lapIdx];
      ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(tx,ty);
      ctx.strokeStyle=col+"44"; ctx.lineWidth=6; ctx.lineCap="round"; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(tx,ty);
      ctx.strokeStyle=col+"cc"; ctx.lineWidth=2; ctx.stroke();
    });

    // Active segment + runner dot
    const seg=SEGMENTS[currentSeg];
    if(seg){
      const fc=LABEL_COORDS[seg.from],tc=LABEL_COORDS[seg.to];
      const [fx,fy]=px(fc),pos=lerpCoord(fc,tc,progress),[rx,ry]=px(pos);
      const col=LAP_COLORS[currentLap];
      // trail
      ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(rx,ry);
      ctx.strokeStyle=col+"55"; ctx.lineWidth=6; ctx.lineCap="round"; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(fx,fy); ctx.lineTo(rx,ry);
      ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
      // glow
      const grd=ctx.createRadialGradient(rx,ry,0,rx,ry,28);
      grd.addColorStop(0,col+"66"); grd.addColorStop(1,"transparent");
      ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(rx,ry,28,0,Math.PI*2); ctx.fill();
      // dot
      ctx.beginPath(); ctx.arc(rx,ry,8,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
      ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.stroke();
      // arrow
      const dx=tc[1]-fc[1],dy=-(tc[0]-fc[0]),len=Math.hypot(dx,dy)||1;
      const ax=dx/len*13,ay=dy/len*13;
      ctx.beginPath(); ctx.moveTo(rx+ax,ry+ay);
      ctx.lineTo(rx+ax-ax*.5-ay*.3,ry+ay-ay*.5+ax*.3);
      ctx.lineTo(rx+ax-ax*.5+ay*.3,ry+ay-ay*.5-ax*.3);
      ctx.closePath(); ctx.fillStyle="#fff"; ctx.fill();
    }

    // Waypoint markers — exactly A, B, C, D
    ["A","B","C","D"].forEach(label=>{
      const coord=LABEL_COORDS[label];
      const [lpx,lpy]=px(coord);
      // glow ring
      ctx.beginPath(); ctx.arc(lpx,lpy,14,0,Math.PI*2);
      ctx.fillStyle="rgba(0,229,255,0.09)"; ctx.fill();
      // dot
      ctx.beginPath(); ctx.arc(lpx,lpy,9,0,Math.PI*2);
      ctx.fillStyle="#060a14"; ctx.fill();
      ctx.strokeStyle="#00e5ff"; ctx.lineWidth=2; ctx.stroke();
      // letter inside
      ctx.fillStyle="#00e5ff"; ctx.font="bold 9px 'Courier New'";
      ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(label,lpx,lpy);
      // letter above
      ctx.fillStyle="rgba(0,229,255,0.7)"; ctx.font="8px 'Courier New'";
      ctx.fillText(label,lpx,lpy-20);
    });

  },[isRunning,progress,currentSeg,currentLap,completedLaps,mapLoaded,px]);

  return React.createElement('canvas',{ref,width:500,height:430,
    style:{borderRadius:12,width:"100%",height:"100%",display:"block"}});
}

// ─── MAIN APP ─────────────────────────────────────────────────────────
function App(){
  const [isRunning,setIsRunning]=useState(false);
  const [currentSeg,setCurrentSeg]=useState(0);
  const [progress,setProgress]=useState(0);
  const [speedKmh,setSpeedKmh]=useState(0);
  const [elapsed,setElapsed]=useState(0);
  const [finished,setFinished]=useState(false);
  const [avgSpeed,setAvgSpeed]=useState(0);
  const [topSpeed,setTopSpeed]=useState(0);
  const [pace,setPace]=useState("—");
  const [speedHistory,setSpeedHistory]=useState([]);
  const [currentLap,setCurrentLap]=useState(0);
  const [completedLaps,setCompletedLaps]=useState(0);
  const [lapFlash,setLapFlash]=useState(false);

  const animRef=useRef(null),startTsRef=useRef(null),histRef=useRef([]);
  const prevLapsRef=useRef(0);
  const SIM=60;
  const totalMin=SEGMENTS.reduce((a,s)=>a+s.minutes,0); // 34

  function startRun(){
    histRef.current=[]; prevLapsRef.current=0;
    setIsRunning(true); setFinished(false); setCurrentSeg(0); setProgress(0);
    setElapsed(0); setSpeedKmh(0); setAvgSpeed(0); setTopSpeed(0); setPace("—");
    setSpeedHistory([]); setCompletedLaps(0); setCurrentLap(0); setLapFlash(false);
    startTsRef.current=performance.now();
  }

  function resetRun(){
    cancelAnimationFrame(animRef.current);
    setIsRunning(false); setFinished(false); setProgress(0); setCurrentSeg(0);
    setSpeedKmh(0); setElapsed(0); setAvgSpeed(0); setTopSpeed(0); setPace("—");
    setSpeedHistory([]); setCompletedLaps(0); setCurrentLap(0); setLapFlash(false);
    histRef.current=[]; prevLapsRef.current=0;
  }

  // Lap tracking
  useEffect(()=>{
    const lc=LAP_BOUNDARIES.filter(b=>b<currentSeg).length;
    if(lc>prevLapsRef.current){ setLapFlash(true); setTimeout(()=>setLapFlash(false),600); }
    prevLapsRef.current=lc;
    setCompletedLaps(lc); setCurrentLap(lc);
  },[currentSeg]);

  // Animation loop
  useEffect(()=>{
    if(!isRunning) return;
    function tick(){
      const realSec=(performance.now()-startTsRef.current)/1000;
      const simSec=realSec*SIM;
      setElapsed(simSec);
      let rem=simSec, seg=0, segEl=simSec;
      for(let i=0;i<SEGMENTS.length;i++){
        const dur=SEGMENTS[i].minutes*60;
        if(rem<=dur){seg=i;segEl=rem;break;}
        rem-=dur;
        if(i===SEGMENTS.length-1){
          setIsRunning(false); setFinished(true);
          setProgress(1); setCurrentSeg(SEGMENTS.length); setSpeedKmh(0);
          setCompletedLaps(LAPS);
          const h=histRef.current;
          if(h.length){
            const avg=h.reduce((a,b)=>a+b,0)/h.length;
            setAvgSpeed(parseFloat(avg.toFixed(1)));
            const pm=avg>0?60/avg:0;
            setPace(`${Math.floor(pm)}:${String(Math.round((pm%1)*60)).padStart(2,"0")} /km`);
          }
          return;
        }
      }
      setCurrentSeg(seg); setProgress(Math.min(segEl/(SEGMENTS[seg].minutes*60),1));
      const fc=LABEL_COORDS[SEGMENTS[seg].from], tc=LABEL_COORDS[SEGMENTS[seg].to];
      const spd=realisticSpeed(coordDist(fc,tc)/(SEGMENTS[seg].minutes/60),simSec/5,seg);
      const rounded=parseFloat(spd.toFixed(1));
      setSpeedKmh(rounded); histRef.current.push(rounded);
      if(histRef.current.length%3===0) setSpeedHistory([...histRef.current]);
      setTopSpeed(prev=>Math.max(prev,rounded));
      const h=histRef.current, avg=h.reduce((a,b)=>a+b,0)/h.length;
      setAvgSpeed(parseFloat(avg.toFixed(1)));
      const pm=avg>0?60/avg:0;
      setPace(`${Math.floor(pm)}:${String(Math.round((pm%1)*60)).padStart(2,"0")} /km`);
      animRef.current=requestAnimationFrame(tick);
    }
    animRef.current=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(animRef.current);
  },[isRunning]);

  const elMin=elapsed/60, pct=Math.min((elMin/totalMin)*100,100);
  const PBG="rgba(255,255,255,0.025)", PBD="1px solid rgba(0,229,255,0.13)";
  const LBL={fontSize:10,color:"#00e5ff",letterSpacing:4,marginBottom:8,textTransform:"uppercase"};
  const e=React.createElement;

  return e('div',{style:{minHeight:"100vh",background:"#060a14",fontFamily:"'Courier New',monospace",
    display:"flex",flexDirection:"column",alignItems:"center",padding:"18px 12px",gap:14}},

    // Header
    e('div',{style:{textAlign:"center"}},
      e('div',{style:{fontSize:10,color:"#00e5ff",letterSpacing:7,marginBottom:2}},"◈ ROUTE SIMULATION"),
      e('div',{style:{fontSize:26,fontWeight:"bold",color:"#fff",
        textShadow:"0 0 28px rgba(0,229,255,0.5)",letterSpacing:2}},"Runner Tracker")
    ),

    // Route info bar + controls
    e('div',{style:{width:"100%",maxWidth:1100,background:PBG,border:PBD,borderRadius:12,
      padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}},
      e('div',null,
        e('div',{style:{fontSize:10,color:"#00e5ff",letterSpacing:4,marginBottom:6}},"CIRCUIT"),
        e('div',{style:{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}},
          ["A→B (3m)","B→C (2.5m)","C→D (2m)","D→A (1m)"].map((s,i)=>
            e('div',{key:i,style:{fontSize:12,color:"rgba(255,255,255,0.55)",
              background:"rgba(0,229,255,0.06)",border:"1px solid rgba(0,229,255,0.12)",
              borderRadius:6,padding:"3px 10px"}},s)
          ),
          e('div',{style:{fontSize:12,color:"#00e5ff",fontWeight:"bold",marginLeft:4}},"× 4 LAPS")
        )
      ),
      e('div',{style:{display:"flex",gap:10,alignItems:"center"}},
        !isRunning&&!finished&&e('button',{onClick:startRun,style:{
          background:"linear-gradient(135deg,#00ffb3,#00cc8a)",border:"none",borderRadius:8,
          padding:"10px 26px",color:"#060a14",fontWeight:"bold",fontSize:13,cursor:"pointer",
          letterSpacing:2,fontFamily:"'Courier New',monospace"}},"▶ START RUN"),
        (isRunning||finished)&&e('button',{onClick:resetRun,style:{
          background:"rgba(255,100,50,0.12)",border:"1px solid rgba(255,100,50,0.38)",
          borderRadius:8,padding:"10px 26px",color:"#ff6b35",fontWeight:"bold",fontSize:13,
          cursor:"pointer",letterSpacing:2,fontFamily:"'Courier New',monospace"}},"⏹ RESET"),
        finished&&e('span',{style:{color:"#00ffb3",fontSize:13,fontWeight:"bold"}},"🏁 RUN COMPLETE!")
      )
    ),

    // Main grid
    e('div',{style:{display:"flex",gap:12,width:"100%",maxWidth:1100,
      alignItems:"flex-start",flexWrap:"wrap"}},

      // Map
      e('div',{style:{flex:"1 1 430px",minWidth:260,height:430,background:PBG,border:PBD,
        borderRadius:12,overflow:"hidden",position:"relative"}},
        e(MapCanvas,{isRunning,progress,currentSeg,currentLap,completedLaps}),
        isRunning&&e('div',{style:{position:"absolute",top:8,left:8,display:"flex",
          alignItems:"center",gap:7,background:"rgba(0,0,0,0.7)",borderRadius:8,padding:"5px 11px"}},
          e('div',{style:{width:7,height:7,borderRadius:"50%",background:"#00ffb3",
            boxShadow:"0 0 8px #00ffb3",animation:"blink 0.9s infinite alternate"}}),
          e('span',{style:{color:"#00ffb3",fontSize:11,fontWeight:"bold"}},
            SEGMENTS[currentSeg]?`${SEGMENTS[currentSeg].from} → ${SEGMENTS[currentSeg].to}`:"")
        ),
        completedLaps>0&&e('div',{style:{position:"absolute",top:8,right:8,
          background:"rgba(0,0,0,0.75)",borderRadius:8,padding:"5px 11px",
          border:"1px solid rgba(0,255,180,0.3)"}},
          e('span',{style:{color:"#00ffb3",fontSize:11,fontWeight:"bold"}},
            `🏁 ${completedLaps} LAP${completedLaps!==1?"S":""}`)
        ),
        !isRunning&&!finished&&e('div',{style:{position:"absolute",inset:0,display:"flex",
          alignItems:"center",justifyContent:"center",color:"rgba(0,229,255,0.22)",
          fontSize:13,textAlign:"center",padding:24}},"Press START RUN to begin")
      ),

      // Centre column
      e('div',{style:{flex:"0 0 355px",minWidth:260,display:"flex",flexDirection:"column",gap:10}},
        // Gauge + Stats
        e('div',{style:{display:"flex",gap:10,alignItems:"stretch"}},
          e('div',{style:{background:PBG,border:PBD,borderRadius:12,padding:"11px 8px",
            textAlign:"center",flexShrink:0}},
            e('div',{style:LBL},"Speed Radar"),
            e(SpeedGauge,{speedKmh,maxSpeed:20})
          ),
          e('div',{style:{background:PBG,border:PBD,borderRadius:12,padding:"11px 13px",
            flex:1,display:"flex",flexDirection:"column"}},
            e('div',{style:LBL},"Stats"),
            ...[
              ["Elapsed",`${Math.floor(elMin)}m ${Math.floor((elMin%1)*60)}s`],
              ["Total","34 min"],
              ["Segment",isRunning||finished?`${Math.min(currentSeg+1,16)}/16`:"—"],
              ["Current",`${speedKmh.toFixed(1)} km/h`],
              ["Avg Spd",`${avgSpeed.toFixed(1)} km/h`],
              ["Top Spd",`${topSpeed.toFixed(1)} km/h`],
              ["Avg Pace",pace],
            ].map(([k,v])=>e('div',{key:k,style:{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:11}},
              e('span',{style:{color:"rgba(255,255,255,0.35)"}},k),
              e('span',{style:{color:"#fff",fontWeight:"bold"}},v)
            )),
            e('div',{style:{marginTop:"auto",paddingTop:6}},
              e('div',{style:{display:"flex",justifyContent:"space-between",fontSize:9,
                color:"rgba(255,255,255,0.25)",marginBottom:3}},
                e('span',"PROGRESS"),e('span',`${pct.toFixed(0)}%`)),
              e('div',{style:{height:5,background:"rgba(255,255,255,0.07)",borderRadius:3}},
                e('div',{style:{height:"100%",borderRadius:3,width:`${pct}%`,
                  background:"linear-gradient(90deg,#00e5ff,#00ffb3)",transition:"width 0.2s"}})
              )
            )
          )
        ),
        // Route log
        e('div',{style:{background:PBG,border:PBD,borderRadius:12,padding:"11px 13px"}},
          e('div',{style:LBL},"Route Log"),
          e('div',{style:{maxHeight:180,overflowY:"auto"}},
            ...ROUTE_LOG.map((l,i)=>{
              const done=i<currentSeg, active=i===currentSeg&&isRunning;
              const isLapEnd=LAP_BOUNDARIES.includes(i);
              const col=done?"#00e5ff":active?"#00ffb3":"rgba(255,255,255,0.28)";
              return e('div',{key:i,style:{display:"flex",alignItems:"center",gap:7,
                fontSize:11,color:col,marginBottom:4}},
                e('span',{style:{fontSize:10,width:12,textAlign:"center"}},
                  done?"✓":active?"▶":"○"),
                e('span',{style:{flex:1}},l),
                active&&e('span',{style:{fontSize:9,color:"#00ffb3",
                  background:"rgba(0,255,180,0.1)",borderRadius:3,padding:"1px 5px"}},"LIVE"),
                isLapEnd&&e('span',{style:{fontSize:9,color:"#f0c040",
                  background:"rgba(240,192,64,0.1)",borderRadius:3,padding:"1px 5px"}},"🏁 LAP")
              );
            })
          )
        ),
        // Sparkline
        speedHistory.length>4&&e('div',{style:{background:PBG,border:PBD,borderRadius:12,padding:"11px 13px"}},
          e('div',{style:{...LBL,marginBottom:5}},"Speed History"),
          e(SpeedSparkline,{history:speedHistory}),
          e('div',{style:{display:"flex",justifyContent:"space-between",fontSize:9,
            color:"rgba(255,255,255,0.22)",marginTop:3}},
            e('span',"Start"),e('span',"Now"))
        )
      ),

      // Lap counter
      e('div',{style:{flex:"0 0 200px",minWidth:160}},
        e('div',{style:{background:PBG,border:PBD,borderRadius:12,padding:"14px 16px"}},
          e('div',{style:LBL},"Lap Counter"),
          e(LapCounter,{laps:completedLaps,currentSeg,isRunning,lapFlash})
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
